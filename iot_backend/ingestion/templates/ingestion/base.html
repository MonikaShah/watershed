<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Watershed Dashboard{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,Helvetica,sans-serif;
            background:#f5f7fb;
            color:#333;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        main{
            flex:1;
        }

        footer{
            background:#263238;
            color:#fff;
            text-align:center;
            padding:12px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

{% block header %}
{% endblock %}

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    © 2026 Watershed Monitoring System
</footer>

{% block extra_js %}{% endblock %}

</body>
</html>
