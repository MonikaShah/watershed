<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Watershed Dashboard{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,Helvetica,sans-serif;
            background:#f5f7fb;
            color:#333;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        main{
            flex:1;
        }

        footer{
            background:#263238;
            color:#fff;
            text-align:center;
            padding:12px;
        }
        .header{
        background:#fff;
        border-bottom:1px solid #e5e7eb;
        box-shadow:0 4px 14px rgba(0,0,0,.08);
    }

    .header-content{
        max-width:1450px;
        margin:auto;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px 30px;
    }

    .brand{
        display:flex;
        align-items:center;
        gap:16px;
    }

    .brand-icon{
        width:56px;
        height:56px;
        border-radius:14px;
        background:linear-gradient(135deg,#2563eb,#60a5fa);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#fff;
        font-size:28px;
    }

    .brand h1{
        margin:0;
        color:#1f2937;
        font-size:30px;
    }

    .brand span{
        color:#6b7280;
    }

    .nav-links{
        display:flex;
        gap:12px;
    }

    .nav-links a{
        text-decoration:none;
        color:#374151;
        padding:10px 18px;
        border-radius:10px;
        font-weight:600;
    }

    .nav-links a:hover{
        background:#eff6ff;
        color:#2563eb;
    }

    .nav-links a.active{
        background:#2563eb;
        color:white;
    }
        .topbar{
            position:sticky;
            top:0;
            z-index:1000;
            background:#fff;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 35px;
            border-bottom:1px solid #e5e7eb;
            box-shadow:0 3px 14px rgba(0,0,0,.08);
        }

        .brand{
            display:flex;
            align-items:center;
            gap:16px;
        }

        .brand-icon{
            width:56px;
            height:56px;
            border-radius:14px;
            background:linear-gradient(135deg,#2563eb,#60a5fa);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            color:#fff;
        }

        .topnav{
            display:flex;
            gap:12px;
        }

        .topnav a{
            text-decoration:none;
            color:#374151;
            padding:11px 18px;
            border-radius:10px;
            font-weight:600;
            transition:.25s;
        }

        .topnav a:hover{
            background:#eff6ff;
            color:#2563eb;
        }

        .topnav .active{
            background:#2563eb;
            color:#fff;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

{% block header %}
{% endblock %}

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    © 2026 Watershed Monitoring System
</footer>

{% block extra_js %}{% endblock %}

</body>
</html>
