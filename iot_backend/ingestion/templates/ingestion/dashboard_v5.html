{% load custom_tags %}
<!DOCTYPE html>
<html>

<head>

<title>IoT Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#f4f6fb;
    margin:0;
}

.header{
    background:#fff;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:end;
}

.section-title{
    font-weight:bold;
    margin-bottom:5px;
}

select,input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
    min-width:200px;
}

button{
    background:#2ba0c7;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.card{
    background:#fff;
    margin:20px;
    padding:20px;
    border-radius:10px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
    margin-bottom:20px;
}

.stat-box{

    background:linear-gradient(
        180deg,
        #f8fbff,
        #eef5ff
    );

    padding:16px;

    border-radius:14px;

    text-align:center;

    border:1px solid #dbeafe;

    box-shadow:
        0 2px 8px rgba(0,0,0,0.05);

    transition:0.2s;

}

.stat-box:hover{
    transform:translateY(-2px);
}

.table-wrap{
    max-height:500px;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

th{
    background:#2ba0c7;
    color:white;
    position:sticky;
    top:0;
}

tr:hover{
    background:#eef;
}

#deviceInfo{
    background:#eef5ff;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
}

/* ====================================
CHART CARDS
==================================== */

.chart-card{

    background:#ffffff;

    border-radius:18px;

    margin-top:30px;

    box-shadow:
        0 4px 14px rgba(0,0,0,0.08);

    overflow:hidden;

    border:1px solid #e5e7eb;

}

/* HEADER */

.chart-header{

    background:linear-gradient(
        90deg,
        #0f172a,
        #1e293b
    );

    color:white;

    padding:14px 20px;

    font-size:18px;

    font-weight:bold;

    letter-spacing:0.5px;

}

/* BODY */

.chart-body{

    padding:20px;

    height:500px;

    position:relative;

}

/* WIND BODY */

.wind-body{

    height:600px;

}

#mainCanvas,
#windRoseCanvas{

    width:100% !important;

    height:100% !important;

}

</style>

</head>

<body>

<div style="
    width:100%;
    padding:10px;
    background:#1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
">

    <div style="color:white;font-weight:bold;">
        📊 Custom Dashboard
    </div>

    <a href="/"
       style="
        background:#16a34a;
        color:white;
        padding:8px 12px;
        border-radius:6px;
        text-decoration:none;
    ">
        🏠 Home
    </a>

</div>

<div class="header">

<h2>📊 IoT Dashboard</h2>

<div class="controls">

<!-- CATEGORY -->

<div>

<div class="section-title">
Category
</div>

<select id="categorySelect">

<option value="">
-- Select Category --
</option>

<option value="flow_meter">
🌊 Flow Meter
</option>

<option value="weather_station">
🌦 Weather Station
</option>

<option value="water_level">
💧 Water Level Detector
</option>

</select>

</div>

<!-- VILLAGE -->

<div>

<div class="section-title">
Village
</div>

<select id="villageSelect">

<option value="">
-- Select Village --
</option>

</select>

</div>

<!-- DEVICE -->

<div>

<div class="section-title">
Device
</div>

<select id="deviceSelect">

<option value="">
-- Select Device --
</option>

</select>

</div>

<!-- FROM -->

<div>

<div class="section-title">
From Date
</div>

<input type="date" id="fromDate">

</div>

<!-- TO -->

<div>

<div class="section-title">
To Date
</div>

<input type="date" id="toDate">

</div>

<!-- LOAD -->

<div>

<button type="button"
        onclick="loadDashboard()">

Load

</button>

</div>

<!-- VIEW -->

<div>

<button type="button"
        onclick="showView('chart')">

📈 Chart

</button>

<button type="button"
        onclick="showView('table')">

📋 Table

</button>

<button type="button"
        onclick="downloadCSV()">

⬇ Download CSV

</button>

</div>

</div>

</div>

<div class="card">

<h3 id="title">
Analytics
</h3>

<div id="deviceInfo"></div>

<div id="chartView">

    <!-- STATS -->
    <div class="stats"
         id="statsBox"></div>

    <!-- MAIN CHART -->

    <div class="chart-card">

        <div class="chart-header">
            📈 Weather Analytics
        </div>

        <div class="chart-body">

            <canvas id="mainCanvas"></canvas>

        </div>

    </div>

    <!-- WIND ROSE -->

    <div id="windRoseContainer"
         class="chart-card"
         style="display:none;">

        <div class="chart-header">
            🌬 Wind Direction Rose
        </div>

        <div class="chart-body wind-body">

            <canvas id="windRoseCanvas"></canvas>

        </div>

    </div>

</div>

<div id="tableView"
     style="display:none;"
     class="table-wrap"></div>

</div>

{{ table_data|json_script:"table-data" }}
{{ device_map|json_script:"device-map" }}

<script>

// =====================================
// DATA
// =====================================

const rawData =
    JSON.parse(
        document
        .getElementById(
            "table-data"
        ).textContent
    );

const deviceMap =
    JSON.parse(
        document
        .getElementById(
            "device-map"
        ).textContent
    );

// =====================================
// ELEMENTS
// =====================================

const categorySelect =
    document.getElementById(
        "categorySelect"
    );

const villageSelect =
    document.getElementById(
        "villageSelect"
    );

const deviceSelect =
    document.getElementById(
        "deviceSelect"
    );

// =====================================
// DJANGO VALUES
// =====================================

const selectedDevice =
    "{{ selected_device|default:'' }}";

const selectedFrom =
    "{{ from_date|default:'' }}";

const selectedTo =
    "{{ to_date|default:'' }}";

// =====================================
// LOAD VILLAGES
// =====================================

function loadVillages(){

    const category =
        categorySelect.value;

    villageSelect.innerHTML =
        `<option value="">
        -- Select Village --
        </option>`;

    if(!category)
        return;

    const villages =
        new Set();

    Object.entries(deviceMap)
    .forEach(([device,meta])=>{

        if(
            String(meta.category)
            .toLowerCase()
            ===
            category.toLowerCase()
        ){

            if(meta.village){

                villages.add(
                    meta.village
                );

            }

        }

    });

    [...villages]
    .sort()
    .forEach(v=>{

        const opt =
            document.createElement(
                "option"
            );

        opt.value = v;

        opt.textContent = v;

        villageSelect.appendChild(opt);

    });

}

// =====================================
// LOAD DEVICES
// =====================================

function loadDevices(){

    const category =
        categorySelect.value;

    const village =
        villageSelect.value;

    deviceSelect.innerHTML =
        `<option value="">
        -- Select Device --
        </option>`;

    Object.entries(deviceMap)
    .forEach(([deviceKey,meta])=>{

        if(

            String(meta.category)
            .toLowerCase()
            ===
            category.toLowerCase()

            &&

            String(meta.village)
            .toLowerCase()
            ===
            village.toLowerCase()

        ){

            const opt =
                document.createElement(
                    "option"
                );

            opt.value =
                deviceKey;

            opt.textContent =
                meta.name ||
                deviceKey;

            deviceSelect.appendChild(opt);

        }

    });

}

// =====================================
// LABELS
// =====================================

function cleanLabel(label){

    const l =
        label.toLowerCase();

    if(l.includes("weather_tw"))
        return "Temperature (°C)";

    if(l.includes("weather_rhw"))
        return "Humidity (%)";

    if(l.includes("weather_bp"))
        return "Pressure (hPa)";

    if(l.includes("weather_rf"))
        return "Rainfall (mm)";

    if(l.includes("weather_ws"))
        return "Wind Speed (m/s)";

    if(l.includes("weather_wd"))
        return "Wind Direction (°)";

    if(l.includes("weather_sr"))
        return "Solar Radiation";

    if(l.includes("battery"))
        return "Battery Voltage (V)";

    return label
        .replaceAll("_"," ")
        .trim();

}

// =====================================
// CLEAN VALUE
// =====================================

function clean(v){

    if(v===null || v==="")
        return null;

    const n = Number(v);

    return isNaN(n)
        ? null
        : n;

}

// =====================================
// METRICS
// =====================================

function getMetrics(){

    if(!rawData.length)
        return [];

    return Object.keys(rawData[0])
    .filter(k=>{

        const l =
            k.toLowerCase();

        if(
            l.includes("rssi")
        ){
            return false;
        }

        return(
            k !== "time"
            &&
            k !== "device_id"
        );

    });

}

// =====================================
// CHART
// =====================================

let chartInstance = null;
let windRoseChart = null;

function renderChart(){

    const metrics =
        getMetrics();

    const labels =
        rawData.map(r=>r.time);

    const datasets = [];

    let windDirectionField =
        null;

    metrics.forEach(m=>{

        const l =
            m.toLowerCase();

        if(
            l.includes("_wd")
        ){

            windDirectionField = m;

            return;

        }

        const vals =
            rawData.map(
                r=>clean(r[m])
            );

        if(
            vals.every(v=>v===null)
        ){
            return;
        }

        datasets.push({

            label:
                cleanLabel(m),

            data:
                vals,

            borderWidth:2,

            tension:0.3

        });

    });

    if(chartInstance)
        chartInstance.destroy();

    chartInstance =
        new Chart(

            document.getElementById(
                "mainCanvas"
            ),

            {

                type:"line",

                data:{
                    labels,
                    datasets
                },

                options:{

                    responsive:true,

                    interaction:{
                        mode:'index',
                        intersect:false
                    }

                }

            }

        );

    renderWindRose(
        windDirectionField
    );

}

// =====================================
// WIND ROSE
// =====================================

function renderWindRose(
    field
){

    const container =
        document.getElementById(
            "windRoseContainer"
        );

    if(!field){

        container.style.display =
            "none";

        return;

    }

    const directions =
        rawData
        .map(r=>clean(r[field]))
        .filter(v=>v!==null);

    if(!directions.length){

        container.style.display =
            "none";

        return;

    }

    container.style.display =
        "block";

    const bins = {

        N:0,
        NE:0,
        E:0,
        SE:0,
        S:0,
        SW:0,
        W:0,
        NW:0

    };

    directions.forEach(d=>{

        if(d >= 337.5 || d < 22.5)
            bins.N++;

        else if(d < 67.5)
            bins.NE++;

        else if(d < 112.5)
            bins.E++;

        else if(d < 157.5)
            bins.SE++;

        else if(d < 202.5)
            bins.S++;

        else if(d < 247.5)
            bins.SW++;

        else if(d < 292.5)
            bins.W++;

        else
            bins.NW++;

    });

    if(windRoseChart)
        windRoseChart.destroy();

    windRoseChart =
        new Chart(

            document
            .getElementById(
                "windRoseCanvas"
            ),

            {

                type:"polarArea",

                data:{

                    labels:
                        Object.keys(bins),

                    datasets:[{

                        label:
                            "Wind Direction",

                        data:
                            Object.values(bins)

                    }]

                },

                options:{

                    responsive:true,

                    maintainAspectRatio:false

                }

            }

        );

}

// =====================================
// STATS
// =====================================

function renderStats(){

    const metrics =
        getMetrics();

    const el =
        document.getElementById(
            "statsBox"
        );

    el.innerHTML = "";

    metrics.forEach(m=>{

        const vals =
            rawData
            .map(r=>clean(r[m]))
            .filter(v=>v!==null);

        if(!vals.length)
            return;

        // WIND DIRECTION

        if(
            m.toLowerCase()
            .includes("_wd")
        ){

            const bins = {

                N:0,
                NE:0,
                E:0,
                SE:0,
                S:0,
                SW:0,
                W:0,
                NW:0

            };

            vals.forEach(d=>{

                if(d >= 337.5 || d < 22.5)
                    bins.N++;

                else if(d < 67.5)
                    bins.NE++;

                else if(d < 112.5)
                    bins.E++;

                else if(d < 157.5)
                    bins.SE++;

                else if(d < 202.5)
                    bins.S++;

                else if(d < 247.5)
                    bins.SW++;

                else if(d < 292.5)
                    bins.W++;

                else
                    bins.NW++;

            });

            const dominant =
                Object.entries(bins)
                .sort((a,b)=>b[1]-a[1])[0];

            el.innerHTML += `

            <div class="stat-box">

                <div style="
                    font-size:18px;
                    font-weight:bold;
                ">
                    🌬 Wind Direction
                </div>

                <div style="
                    font-size:38px;
                    font-weight:bold;
                    margin-top:10px;
                ">
                    ${dominant[0]}
                </div>

                <div style="
                    margin-top:10px;
                    line-height:1.7;
                ">

                    Dominant Count :
                    <b>${dominant[1]}</b>

                    <br>

                    Total Readings :
                    <b>${vals.length}</b>

                </div>

            </div>

            `;

        }

        else{

            const min =
                Math.min(...vals);

            const max =
                Math.max(...vals);

            const avg =
                (
                    vals.reduce(
                        (a,b)=>a+b,
                        0
                    ) / vals.length
                ).toFixed(2);

            el.innerHTML += `

            <div class="stat-box">

                <b>
                    ${cleanLabel(m)}
                </b>

                <hr>

                Min : ${min}<br>
                Max : ${max}<br>
                Avg : ${avg}

            </div>

            `;

        }

    });

}

// =====================================
// TABLE
// =====================================

function renderTable(){

    const metrics =
        getMetrics();

    let html =
        "<table>";

    html +=
        "<tr><th>Time</th>";

    metrics.forEach(m=>{

        html += `
        <th>
        ${cleanLabel(m)}
        </th>`;

    });

    html += "</tr>";

    rawData.forEach(r=>{

        html +=
            `<tr>
            <td>${r.time}</td>`;

        metrics.forEach(m=>{

            html += `
            <td>
            ${r[m] ?? "-"}
            </td>`;

        });

        html += "</tr>";

    });

    html += "</table>";

    document.getElementById(
        "tableView"
    ).innerHTML = html;

}

// =====================================
// VIEW
// =====================================

function showView(type){

    document.getElementById(
        "chartView"
    ).style.display =

        type==="chart"
        ? "block"
        : "none";

    document.getElementById(
        "tableView"
    ).style.display =

        type==="table"
        ? "block"
        : "none";

}

// =====================================
// LOAD DASHBOARD
// =====================================

function loadDashboard(){

    const device =
        deviceSelect.value;

    const from =
        document.getElementById(
            "fromDate"
        ).value;

    const to =
        document.getElementById(
            "toDate"
        ).value;

    if(!device){

        alert("Select device");

        return;

    }

    if(!from || !to){

        alert("Select dates");

        return;

    }

    window.location.href =

        `?device=${device}`

        + `&from_date=${from}`

        + `&to_date=${to}`;

}

// =====================================
// DOWNLOAD CSV
// =====================================

function downloadCSV(){

    document.getElementById(
        "csvTableData"
    ).value =
        JSON.stringify(rawData);

    document.getElementById(
        "csvColumns"
    ).value =
        JSON.stringify(
            Object.keys(rawData[0])
        );

    document.getElementById(
        "csvDevice"
    ).value =
        deviceSelect.value;

    document.getElementById(
        "csvForm"
    ).submit();

}

// =====================================
// EVENTS
// =====================================

categorySelect.addEventListener(
    "change",
    ()=>{
        loadVillages();
    }
);

villageSelect.addEventListener(
    "change",
    ()=>{
        loadDevices();
    }
);

// =====================================
// INIT
// =====================================

window.onload = function(){

    if(selectedFrom){

        document.getElementById(
            "fromDate"
        ).value =
            selectedFrom;

    }

    if(selectedTo){

        document.getElementById(
            "toDate"
        ).value =
            selectedTo;

    }

    if(selectedDevice){

        const meta =
            deviceMap[selectedDevice];

        if(meta){

            categorySelect.value =
                meta.category;

            loadVillages();

            villageSelect.value =
                meta.village;

            loadDevices();

            deviceSelect.value =
                selectedDevice;

        }

    }

    showView("chart");

    if(rawData.length){

        renderChart();

        renderStats();

        renderTable();

    }

};

</script>

<!-- CSV FORM -->

<form
    id="csvForm"
    method="POST"
    action="{% url 'export_csv' %}"
    style="display:none;"
>

{% csrf_token %}

<input type="hidden"
       name="table_data"
       id="csvTableData">

<input type="hidden"
       name="columns"
       id="csvColumns">

<input type="hidden"
       name="device"
       id="csvDevice">

</form>

</body>
</html>
